<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carico Magazzino - Gestionale Magazzino</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🏭 Gestionale Magazzino</div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="materie-prime.html">Materie Prime</a>
            <a href="carico.html" class="active">Carico</a>
            <a href="scarico.html">Scarico</a>
            <a href="stock.html">Stock</a>
            <a href="api.html">API</a>
            <button id="logoutBtn" class="btn btn-sm btn-danger">Logout</button>
        </div>
    </nav>
    
    <div class="container">
        <h1>Carico Magazzino</h1>
        
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 24px;">
            <!-- Form Nuovo Carico -->
            <div class="card">
                <h2>Nuovo Carico</h2>
                
                <div id="message" style="display: none;"></div>
                
                <form id="caricoForm">
                    <div class="form-group">
                        <label for="codiceMateriale">Codice Materiale *</label>
                        <select id="codiceMateriale" required>
                            <option value="">Seleziona...</option>
                        </select>
                    </div>
                    
                    <div id="materialeInfo" style="display: none; padding: 12px; background: #f1f5f9; border-radius: 6px; margin-bottom: 16px;">
                        <div style="display: flex; gap: 12px; align-items: center;">
                            <img id="materiale InfoFoto" class="image-preview" alt="Foto materiale" style="display: none;">
                            <div>
                                <div><strong>Colore:</strong> <span id="materialeInfoColore"></span></div>
                                <div><strong>Part Number:</strong> <span id="materialeInfoPartNumber"></span></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="quantita">Quantità (pezzi) *</label>
                        <input type="number" id="quantita" required min="1" step="1" placeholder="es. 100">
                    </div>
                    
                    <div class="form-group">
                        <label for="prezzoTotale">Prezzo Totale (senza IVA) *</label>
                        <input type="number" id="prezzoTotale" required min="0" step="0.01" placeholder="es. 1500.00">
                    </div>
                    
                    <div class="form-group">
                        <label for="ivaPercentuale">IVA %</label>
                        <input type="number" id="ivaPercentuale" value="0" min="0" max="100" step="0.1" placeholder="es. 22">
                        <small style="color: var(--secondary-color);">Default: 0%</small>
                    </div>
                    
                    <div style="background: #f8fafc; padding: 16px; border-radius: 6px; margin-bottom: 16px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span>Prezzo Unitario:</span>
                            <strong id="prezzoUnitarioCalc">€ 0,00</strong>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span>Importo IVA:</span>
                            <strong id="importoIvaCalc">€ 0,00</strong>
                        </div>
                        <div style="display: flex; justify-content: space-between; border-top: 1px solid var(--border-color); padding-top: 8px; margin-top: 8px;">
                            <span><strong>Totale con IVA:</strong></span>
                            <strong style="color: var(--primary-color); font-size: 18px;" id="totaleConIvaCalc">€ 0,00</strong>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-success btn-block">✅ Carica in Magazzino</button>
                </form>
            </div>
            
            <!-- Storico Carichi -->
            <div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h2>Storico Carichi</h2>
                    <button id="exportBtn" class="btn btn-secondary">📥 Esporta CSV</button>
                </div>
                
                <div class="filters">
                    <div class="filters-row">
                        <div class="form-group">
                            <label for="filterCodice">Filtra per Codice</label>
                            <select id="filterCodice">
                                <option value="">Tutti</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="filterData">Filtra per Data</label>
                            <input type="date" id="filterData">
                        </div>
                        <div class="form-group">
                            <button id="filterBtn" class="btn btn-primary">🔍 Filtra</button>
                            <button id="resetBtn" class="btn btn-secondary">🔄 Reset</button>
                        </div>
                    </div>
                </div>
                
                <div id="carichiTable" class="table-container">
                    <p class="empty-state">Caricamento...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/carico.js"></script>
</body>
</html>
